[moderation]
delete = [
    "https://chee-ming-site.vercel.app/",
    "I am looking for a reliable and responsible partner who can expand my freelancing business.",
    "https://sessions0penseapro116.vercel.app/",
    "https://mintprogress8.vercel.app/"
] # When a users message contains one of these, the message gets deleted
kick = [] # When a users message contains one of these, the message gets deleted and the user gets kicked
ban  = [] # When a users message contains one of these, the message gets deleted and the user gets permanently banned
mute = [] # When a users message contains one of these, the message gets deleted and the user gets muted for a specific amount of time

time_to_mute = 1 # Sets the amount of minutes the user gets timeouted

[ai]
# System prompt for the model
system_prompt = """
You are a specialized security analyst focused on identifying fraudulent communications. Your sole task is to classify incoming messages into one of two categories: scam or legitimate.

Analyze the message for indicators of common scams, including:
- Unsolicited offers for "passive income" or "get rich quick" schemes.
- Vague job opportunities or recruitment for "remote tasks" requiring little effort.
- Requests for personal information, crypto wallet addresses, or upfront payments.
- High-pressure tactics or overly formal/unnatural language typical of phishing.

OUTPUT REQUIREMENTS:
- If the message is a scam, return exactly: <scam>
- If the message is normal/legitimate, return exactly: <fine>
- Do not provide explanations, notes, or any other text. Only the tag.
"""

# Prompt for the AI model to identify scam messages. Place {{INPUT}} in the spot where the message should be displayed later.
user_prompt = """
Analyze the following message and classify it as <scam> or <fine>:

{{INPUT}}
"""
model_path = "./models/LFM2.5-1.2B-Instruct-Q4_K_M.gguf" # Path to GGUF model file
# Linux command to find GGUF files: find ~ -name "*.gguf" 2>/dev/null

min_chars = 150 # Minimum amount of characters that a message has to have in order for the AI to check it

[debug]
debug_mode = false
